<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Pulse v0.15.3 tests</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 24px; line-height: 1.5; background: #f6f8fb; color: #172033; }
    .card { background: #fff; border: 1px solid #dbe2ee; border-radius: 16px; padding: 20px; max-width: 960px; box-shadow: 0 10px 30px rgba(23,32,51,.06); }
    h1 { margin-top: 0; }
    .pass { color: #0d7a48; }
    .fail { color: #b42318; }
    code { background: #eef2f8; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Team Pulse v0.15.3 regression checks</h1>
    <p>This is a lightweight browser test page for the durability release plus the v0.15.3 save-state and notification timing patch.</p>
    <div id="results"></div>
  </div>
  <script>
function normalizeText(value) { return String(value ?? '').trim(); }
const TOAST_TIMEOUT_MS = 2000;
function formatManualSaveLabel(value){ if(!value) return ''; const date = new Date(value); return Number.isNaN(date.getTime()) ? '' : `Saved ${new Intl.DateTimeFormat(undefined,{hour:'numeric',minute:'2-digit'}).format(date)}`; }
function fileStatePillLabel(lastSaveReason,lastSaveAt){ const manualSaveLabel = lastSaveReason==='manual' ? formatManualSaveLabel(lastSaveAt) : ''; return manualSaveLabel || 'Autosaved'; }
function normalizeDate(value) { const text = normalizeText(value); return /^\d{4}-\d{2}-\d{2}$/.test(text) ? text : ''; }
function maxIdFromList(ids, prefix) { const prefixText = `${prefix}_`; return ids.reduce((max,id)=>{ const text=normalizeText(id); if(!text.startsWith(prefixText)) return max; const n=Number.parseInt(text.slice(prefixText.length),10); return Number.isFinite(n)?Math.max(max,n):max; },0); }
function normalizeSupportLevel(value) { const legacyMap={'None':'Good','Watch':'Monitor','Needs attention':'Support needed','At risk':'Support needed','Critical':'Urgent'}; const normalized = legacyMap[normalizeText(value)] || normalizeText(value); return ['Good','Monitor','Support needed','Urgent'].includes(normalized) ? normalized : 'Good'; }
function normalizePdcStatus(value) { const normalized = normalizeText(value); return ['Not started','In progress','Blocked','Completed','Needs review'].includes(normalized) ? normalized : 'Not started'; }
function canonicalMeetingType(value) { const normalized = normalizeText(value); if(!normalized) return '1:1'; if(/^1[:\- ]?1$/i.test(normalized)||/one on one/i.test(normalized)) return '1:1'; if(/^(pdc|personal development conversation|development conversation)$/i.test(normalized)) return 'PDC'; if(/^cv review$/i.test(normalized)) return 'CV review'; return ['1:1','PDC','CV review'].includes(normalized)?normalized:'1:1'; }
function nextDocId(doc, kind){ const map={person:['person','p'],event:['event','evt'],customField:['customField','cf'],meeting:['meeting','mtg'],note:['note','note']}; const [counterKey,prefix]=map[kind]; doc.idCounters[counterKey]=(doc.idCounters[counterKey]||0)+1; return `${prefix}_${String(doc.idCounters[counterKey]).padStart(3,'0')}`; }
function normalizePersonRecord(person = {}) { return { id: normalizeText(person.id), name: normalizeText(person.name), level: normalizeText(person.level), mentors: normalizeText(person.mentors), hireDate: normalizeDate(person.hireDate), lastPromotionDate: normalizeDate(person.lastPromotionDate), nextOneOnOneDate: normalizeDate(person.nextOneOnOneDate), pdcStatus: normalizePdcStatus(person.pdcStatus || person.planStatus), supportLevel: normalizeSupportLevel(person.supportLevel || person.riskFlag), developmentGoalSummary: normalizeText(person.developmentGoalSummary), promotionReadiness: normalizeText(person.promotionReadiness), notes: normalizeText(person.notes), customFields: Array.isArray(person.customFields)?person.customFields:[], createdAt: normalizeText(person.createdAt) || '2026-04-15T00:00:00.000Z', legacyId: normalizeText(person.legacyId) }; }
function migrateLegacyStateToV2(rawState){ const reports = Array.isArray(rawState.reports) ? rawState.reports : []; const doc={schemaVersion:2,appVersion:'v0.15.3',createdAt:'2026-04-15T00:00:00.000Z',savedAt:'2026-04-15T00:00:00.000Z',idCounters:{person:0,event:0,customField:0,meeting:0,note:0},people:[],events:[],settings:{thresholds:{oneOnOneDays:14,pdcDays:90,cvReviewDays:180},missingMentorCounts:true,blockedPdcCounts:true,lastExportDate:'',stableMode:false,saveReminderMinutes:15,latestExportFiles:[]}}; reports.forEach((legacyReport)=>{ const personId=nextDocId(doc,'person'); const basePerson=normalizePersonRecord({ id: personId, name: legacyReport.name, notes: legacyReport.notes, planStatus: legacyReport.planStatus, riskFlag: legacyReport.riskFlag, createdAt: legacyReport.createdAt, legacyId: legacyReport.id }); doc.people.push(basePerson); doc.events.push({ id: nextDocId(doc,'event'), type:'person_created', personId, snapshot: basePerson, createdAt: basePerson.createdAt }); (legacyReport.meetings||[]).forEach((meeting)=>{ doc.events.push({ id: nextDocId(doc,'event'), type:'meeting_logged', personId, meetingId: nextDocId(doc,'meeting'), meetingType: canonicalMeetingType(meeting.meetingType), meetingDate: normalizeDate(meeting.meetingDate), notes: normalizeText(meeting.notes), createdAt: meeting.createdAt || basePerson.createdAt }); }); }); return doc; }
function latestMeetingDate(report, type){ return (report.meetings||[]).find((meeting)=>canonicalMeetingType(meeting.meetingType)===canonicalMeetingType(type))?.meetingDate || ''; }
function dateDiffInDays(dateString){ const text = normalizeDate(dateString); if(!text) return null; const date = new Date(`${text}T00:00:00Z`); const today = new Date('2026-04-15T00:00:00Z'); return Math.floor((today-date)/86400000); }
function isMissingTouchpointOverdue(report,lastDate,thresholdDays){ if(lastDate){ const age=dateDiffInDays(lastDate); return age===null?true:age>thresholdDays; } if(report.hireDate){ const hireAge=dateDiffInDays(report.hireDate); return hireAge===null?true:hireAge>thresholdDays; } return true; }
function buildReportMetrics(report, settings){ const lastOneOnOne = latestMeetingDate(report,'1:1'); return { oneOnOneOverdue: isMissingTouchpointOverdue(report,lastOneOnOne,settings.thresholds.oneOnOneDays) }; }
function unescapeIcsText(value){ return String(value||'').replace(/\\n/gi,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\'); }
function parseIcsDate(value){ const text = normalizeText(value); if(/^\d{8}$/.test(text)) return `${text.slice(0,4)}-${text.slice(4,6)}-${text.slice(6,8)}`; if(/^\d{8}T\d{6}Z?$/.test(text)) return `${text.slice(0,4)}-${text.slice(4,6)}-${text.slice(6,8)}`; return ''; }
function parseIcsEvents(text){ const unfolded=String(text||'').replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'').replace(/\r/g,'\n'); const chunks=unfolded.split('BEGIN:VEVENT').slice(1); return chunks.map((chunk)=>{ const body=chunk.split('END:VEVENT')[0]||''; const lines=body.split('\n').map((line)=>line.trim()).filter(Boolean); const data={}; lines.forEach((line)=>{ const idx=line.indexOf(':'); if(idx===-1) return; const key=line.slice(0,idx).split(';')[0].toUpperCase(); const value=line.slice(idx+1); if(!data[key]) data[key]=[]; data[key].push(value); }); return { uid: normalizeText(data.UID?.[0]), summary: unescapeIcsText(data.SUMMARY?.[0]||''), startDate: parseIcsDate(data.DTSTART?.[0]||'') }; }).filter((event)=>event.uid||event.summary||event.startDate); }
const results=[]; function test(name, fn){ try{ fn(); results.push({name, ok:true}); }catch(error){ results.push({name, ok:false, error:error.message}); } } function assert(cond, message){ if(!cond) throw new Error(message); }
test('maxIdFromList reads numeric suffixes', ()=>{ assert(maxIdFromList(['p_001','p_010','p_002'], 'p')===10, 'expected 10'); });
test('normalizeSupportLevel maps legacy values', ()=>{ assert(normalizeSupportLevel('None')==='Good', 'None should map to Good'); assert(normalizeSupportLevel('Needs attention')==='Support needed', 'Needs attention should map'); });
test('canonicalMeetingType maps development conversation to PDC', ()=>{ assert(canonicalMeetingType('Personal development conversation')==='PDC', 'expected PDC'); });
test('legacy migration generates unique person IDs even if legacy IDs collide', ()=>{ const doc = migrateLegacyStateToV2({ reports:[{id:'p_001',name:'A',planStatus:'Blocked'},{id:'p_001',name:'B'}]}); assert(doc.people[0].id==='p_001' && doc.people[1].id==='p_002', 'expected p_001 and p_002'); });
test('ics parser captures UID', ()=>{ const events = parseIcsEvents('BEGIN:VCALENDAR\nBEGIN:VEVENT\nUID:abc-123\nSUMMARY:1:1 with Anders\nDTSTART:20260410T120000Z\nEND:VEVENT\nEND:VCALENDAR'); assert(events[0].uid==='abc-123', 'expected UID'); assert(events[0].startDate==='2026-04-10', 'expected parsed date'); });
test('new hires are not overdue before threshold passes', ()=>{ const metrics = buildReportMetrics({ hireDate:'2026-04-10', meetings:[] }, { thresholds:{ oneOnOneDays:14 } }); assert(metrics.oneOnOneOverdue===false, 'new hire should not be overdue yet'); });

test('manual save pill label shows the saved time', ()=>{ const label = fileStatePillLabel('manual','2026-04-15T11:49:00.000Z'); assert(/^Saved /.test(label), 'expected Saved time label'); });
test('autosave pill label stays Autosaved', ()=>{ assert(fileStatePillLabel('autosave','2026-04-15T11:49:00.000Z')==='Autosaved', 'expected Autosaved'); });
test('toast timeout is 2000 ms', ()=>{ assert(TOAST_TIMEOUT_MS===2000, 'expected 2000 ms'); });

test('create mode should clear any selected report', ()=>{ const ui={ selectedId:'p_001', creatingReport:false }; ui.creatingReport=true; ui.selectedId=null; assert(ui.creatingReport===true && ui.selectedId===null, 'expected create mode with no selected report'); });
test('report form fields with matching name attributes reach FormData', ()=>{ const form = document.createElement('form'); form.innerHTML = '<input name="name" value="Ada Lovelace"><select name="pdcStatus"><option selected>In progress</option></select><textarea name="notes">Test note</textarea>'; const data = new FormData(form); assert(data.get('name')==='Ada Lovelace', 'name should be present'); assert(data.get('pdcStatus')==='In progress', 'pdcStatus should be present'); assert(data.get('notes')==='Test note', 'notes should be present'); });
const resultsEl=document.getElementById('results');
resultsEl.innerHTML = `<ul>${results.map((item)=>`<li class="${item.ok ? 'pass' : 'fail'}">${item.ok ? 'PASS' : 'FAIL'} — <code>${item.name}</code>${item.ok ? '' : ` :: ${item.error}`}</li>`).join('')}</ul>`;
  </script>
</body>
</html>
